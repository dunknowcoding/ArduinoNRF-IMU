sentence=Unified, friendly IMU library with pluggable sensor drivers for the ArduinoNRF board package.
paragraph=One common API across every IMU (accel/gyro/mag, units, calibration), plus chip-specific extras. Ships with an MPU-9250 / GY-9250 driver and an I2C scanner for board bring-up. Designed to also exercise the ArduinoNRF core's I2C and SPI drivers.
