name=NiusIMU
version=0.2.0
author=NiusRobotLab
maintainer=NiusRobotLab
sentence=Unified, friendly IMU library with pluggable sensor drivers for the ArduinoNRF board package.
paragraph=One common API across every IMU (accel/gyro/mag, units, calibration), plus chip-specific extras. Ships with drivers for the MPU-9250 (GY-9250), MPU-6500, BMP280 barometer and the GY-91 10-DOF board, plus an I2C scanner for board bring-up. Designed to also exercise the ArduinoNRF core's I2C and SPI drivers.
